version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resume_agent
      POSTGRES_PASSWORD: resume_agent_dev
      POSTGRES_DB: resume_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_agent -d resume_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: resume_agent_chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE

  redis:
    image: redis:7-alpine
    container_name: resume_agent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  chroma_data:
  redis_data:
